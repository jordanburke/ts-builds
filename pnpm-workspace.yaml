minimumReleaseAgeExclude:
  # First-party packages we publish ourselves — the cooldown adds no
  # supply-chain value here, and version pins re-trip on every release.
  # A name glob covers functype, functype-os, eslint-{config,plugin}-functype
  # at all current and future versions.
  - "*functype*"
  # Third-party deps stay subject to the cooldown (no entries) — pin a specific
  # pkg@version here only if a fresh release blocks a needed lockfile resolution.

overrides:
  unrun: "0.2.37"

peerDependencyRules:
  allowedVersions:
    eslint: "10"

publicHoistPattern:
  - "*eslint*"
  - "*prettier*"
  - "*vitest*"
  - "typescript"
  - "*rimraf*"
  - "*cross-env*"
